on:
  workflow_call:
    inputs:
      branch:
        required: false
        default: ${{ github.ref_name }}
        type: string
      run-id:
        required: false
        default: ${{ github.run_id }}
        type: string
      project-name:
        required: false
        default: quiltmc-org
        type: string
      deploy:
        required: false
        default: false
        type: boolean
    outputs:
      deployment-url:
        description: The URL of the deployed site.
        value: ${{ jobs.publish.outputs.deployment-url }}
      version-id:
        description: The ID of the Worker version that has been created
        value: ${{ jobs.publish.outputs.version-id }}

jobs:
  publish:
    name: "Publish to Cloudflare Pages"
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.cloudflare-publish.outputs.deployment-url }}
      version-id: ${{ steps.version-id.outputs.version-id }}
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GITHUB_RUN_ID: ${{ inputs.run-id }}
      GITHUB_TOKEN: ${{ secrets.COZY_PAT }}
    steps:
      - name: Download Website HTML
        uses: actions/download-artifact@v8
        with:
          name: html
          run-id: ${{ env.GITHUB_RUN_ID }}
          github-token: ${{ env.GITHUB_TOKEN }}
      - name: Upload to Cloudflare
        id: cloudflare-publish # This step needs an ID because its outputs may be needed in subsequent jobs.
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias ${{ inputs.branch }}
      - name: Output Version ID
        id: version-id
        run: echo "version-id=$(npx wrangler versions list --json --config dist/server/wrangler.json | jq '.[0].id')" >> "$GITHUB_OUTPUT"
      - name: Deploy to Production
        if: ${{ inputs.deploy }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
